worker_processes auto;
events { worker_connections 4096; }

http {
    access_log off;

    # Round-robin across every "app" replica. On startup nginx asks Docker's embedded DNS for the
    # "app" service, which returns the A record of every scaled replica; nginx adds them all to this
    # upstream and balances requests across them per-request. That true fan-out is the whole point of
    # the cluster demo — many pods hitting one cold key at once. (A dynamic `resolve` that survives
    # re-scaling needs nginx Plus; for a load test the replica set is fixed, so static resolution is
    # both correct and simpler. Recreate the lb after `--scale` changes.)
    upstream app_pods {
        server app:8080 max_fails=0;
        keepalive 64;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://app_pods;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
