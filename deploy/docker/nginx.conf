worker_processes auto;
events { worker_connections 1024; }

http {
    # Docker's embedded DNS. Re-resolving the "app" service name every 5s means newly scaled-up
    # replicas join the rotation without restarting nginx, and every request is balanced across the
    # current set of pod IPs Docker returns.
    resolver 127.0.0.11 valid=5s ipv6=off;
    access_log off;

    server {
        listen 80;

        location / {
            # Using a variable in proxy_pass forces per-request DNS resolution (vs. resolving once at
            # startup), so the burst really does spread across all "app" replicas — that is the whole
            # point of the cluster demo: many pods, one cold key.
            set $pods app;
            proxy_pass http://$pods:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
