spring:
  application:
    name: reactive-distributed-redis
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ticketing_db
    username: user_poc
    password: pwd_poc
    pool:
      enabled: true
      initial-size: 0   # lazy: the app does not open DB connections until the first query
      max-size: 10

# Redisson connects eagerly on startup, so Redis must be up (docker-compose up -d) before the app boots
redis:
  host: localhost
  port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.areina.distributedlock: DEBUG
    org.redisson: INFO
