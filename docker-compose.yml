services:
  mock-database:
    image: postgres:15-alpine
    container_name: poc-postgres
    environment:
      POSTGRES_USER: user_poc
      POSTGRES_PASSWORD: pwd_poc
      POSTGRES_DB: ticketing_db
    ports:
      - "5432:5432"

