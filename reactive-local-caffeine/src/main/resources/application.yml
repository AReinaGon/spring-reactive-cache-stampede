spring:
  application:
    name: reactive-local-caffeine
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ticketing_db
    username: user_poc
    password: pwd_poc
    pool:
      enabled: true
      initial-size: 0   # lazy: the app boots without a running PostgreSQL (use docker-compose for real queries)
      max-size: 10

management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.areina.cachestampede: DEBUG
